# =============================================================================
# Kohya SS LoRA Training Config — seteveus_style
# Modelo base: SDXL 1.0 (sd_xl_base_1.0.safetensors)
# =============================================================================

[model_arguments]
pretrained_model_name_or_path = "sd_xl_base_1.0.safetensors"
v2 = false
v_parameterization = false

[dataset_arguments]
train_data_dir = "./dataset/seteveus"
resolution = "1024,1024"
enable_bucket = true
min_bucket_reso = 512
max_bucket_reso = 1536
bucket_reso_steps = 64

[training_arguments]
output_dir = "./output"
output_name = "seteveus_style"
save_model_as = "safetensors"
save_precision = "fp16"
save_every_n_epochs = 1

# Treino
train_batch_size = 1
max_train_epochs = 20
seed = 42
clip_skip = 2
mixed_precision = "fp16"
cache_latents = true
cache_latents_to_disk = true
gradient_checkpointing = true

# Optimizer
optimizer_type = "AdamW8bit"
learning_rate = 1e-4
unet_lr = 1e-4
text_encoder_lr = 5e-5
lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 3
lr_warmup_steps = 100

# LoRA
network_module = "networks.lora"
network_dim = 32
network_alpha = 16
network_train_unet_only = false
network_train_text_encoder_only = false

# Regularizacao
noise_offset = 0.05
max_grad_norm = 1.0

# Logging
logging_dir = "./logs"
log_prefix = "seteveus"

[sample_arguments]
sample_every_n_epochs = 5
sample_prompts = "seteveus_style, dark moody landscape with golden light, deep navy blue sky, oil painting style, atmospheric, editorial poetic illustration"
sample_sampler = "euler_a"
